# ──────────────────────────────────────────────────────────────────────
# Recovery publish workflow — alleen voor herpublicatie
# ──────────────────────────────────────────────────────────────────────
# Deze workflow bouwt NOOIT opnieuw. Hij downloadt alleen de artifacts
# van een bestaande GitHub Release en publiceert ze naar PyPI.
#
# Gebruik dit ALLEEN als release.yml de PyPI-publicatie heeft gemist
# (bv. door een netwerkfout of environment-approval die bleef hangen).
#
# Voor normale releases: gebruik release.yml, dat publiceert zelf naar
# GitHub EN PyPI in één build-once pipeline.
# ──────────────────────────────────────────────────────────────────────

name: Publish to PyPI (recovery)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without the leading v (e.g. 0.7.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download release assets from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ inputs.version }}"
          mkdir -p release/python
          echo "Downloading assets from release $TAG ..."
          gh release download "$TAG" \
            --pattern "*.whl" \
            --pattern "*.tar.gz" \
            --dir release/python/
          echo "Downloaded:"
          ls -la release/python/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: release/python/