# ──────────────────────────────────────────────────────────────────────
# Build-once release workflow
# ──────────────────────────────────────────────────────────────────────
# Dit is het ENIGE entrypoint voor productie-releases. De workflow:
#
#   1. quality-and-build  — verifieer, test, bouw ALLE artifacts (wheel,
#      sdist, Skills ZIP, checksums) en upload 1 immutable bundle.
#   2. publish-github     — download de bundle, push de tag, maak GitHub
#      Release met alle assets.
#   3. publish-pypi       — download de bundle, publiceer naar PyPI.
#
# Er wordt NOOIT opnieuw gebouwd. Hetzelfde artifact gaat naar GitHub
# EN PyPI. Herpublicatie (recovery) gebeurt via publish.yml, dat ook
# nooit opnieuw bouwt.
#
# Trigger: Actions tab → "Release" → "Run workflow" → voer de versie in
# (zonder voorloop-v, bv. "0.7.0"). De input MOET gelijk zijn aan
# project.version in pyproject.toml én bound.__version__, wat wordt
# gecontroleerd voordat er iets wordt gebouwd of getagd.
#
# Gebruik RELEASE_PAT (secret) met contents:write + workflows scopes
# om de tag push te laten doorstromen naar publish.yml. Zonder PAT
# wordt de tag nog steeds aangemaakt, maar moet publish.yml handmatig
# worden gestart.
# ──────────────────────────────────────────────────────────────────────

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v (e.g. 0.7.0)"
        required: true
        type: string

# ── Concurrency: voorkom dubbele builds voor dezelfde versie ────────
concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

# ── Minimale root-permissions; per-job worden rechten verhoogd ──────
permissions:
  contents: read

jobs:
# ═════════════════════════════════════════════════════════════════
  #  quality-and-build  — 1x bouwen, 1x uploaden
  # ═════════════════════════════════════════════════════════════════
  quality-and-build:
    name: Quality gate & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.18"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev

      # ── Integriteitscontroles ──────────────────────────────────
      - name: Verify version matches pyproject.toml
        run: |
          PACKAGE_VERSION=$(uv run python -c \
            "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "pyproject.toml version:  $PACKAGE_VERSION"
          echo "Requested version:       ${{ inputs.version }}"
          test "$PACKAGE_VERSION" = "${{ inputs.version }}"
          echo "✅ pyproject.toml version OK"

      - name: Verify version matches bound.__version__
        run: |
          CODE_VERSION=$(uv run python -c "import bound; print(bound.__version__)")
          echo "bound.__version__:  $CODE_VERSION"
          echo "Requested version:   ${{ inputs.version }}"
          test "$CODE_VERSION" = "${{ inputs.version }}"
          echo "✅ bound.__version__ OK"

      - name: Verify changelog has entry for this version
        run: |
          grep -q "^## \[${{ inputs.version }}\]" CHANGELOG.md || \
            { echo "❌ CHANGELOG.md has no entry for [${{ inputs.version }}]"; exit 1; }
          echo "✅ CHANGELOG.md has entry for ${{ inputs.version }}"

      - name: Check tag does not exist yet
        run: |
          TAG="v${{ inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "❌ Tag $TAG already exists!"
            exit 1
          fi
          echo "✅ Tag $TAG does not exist yet"

      # ── Kwaliteitsgate ─────────────────────────────────────────
      - name: Ruff lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q

      # ── Bouwen ─────────────────────────────────────────────────
      - name: Build wheel and sdist
        run: uv build --out-dir release/python

      - name: Build Skills ZIP (deterministic)
        run: uv run python scripts/build_skill_zip.py --out-dir release/skills

      - name: Twine check on wheel & sdist
        run: |
          uv pip install twine
          uv run twine check release/python/*

      - name: Wheel smoke test (install in clean venv)
        run: |
          WHEEL=$(ls release/python/bound_policy-*.whl | head -1)
          echo "Testing wheel: $WHEEL"
          python -m venv /tmp/.bound-wheel-test
          /tmp/.bound-wheel-test/bin/pip install "$WHEEL"
          echo "--- import bound ---"
          /tmp/.bound-wheel-test/bin/python -c "import bound; print(bound.__version__)"
          echo "--- bound --help ---"
          /tmp/.bound-wheel-test/bin/bound --help
          echo "--- bound integration-spec ---"
          /tmp/.bound-wheel-test/bin/bound integration-spec 2>&1 | head -20
          echo "--- Done ---"
          rm -rf /tmp/.bound-wheel-test

      - name: Verify Skills ZIP structure
        run: |
          uv run python -c "
          import zipfile
          with zipfile.ZipFile('release/skills/BOUND-agent-skill.zip') as zf:
              names = zf.namelist()
              assert 'bound/SKILL.md' in names, 'Missing bound/SKILL.md'
              assert 'bound/agents/openai.yaml' in names, 'Missing agents/openai.yaml'
              assert 'bound/references/integration-report.md' in names, 'Missing references/integration-report.md'
              for n in names:
                  assert '__pycache__' not in n, f'Contains pycache: {n}'
                  assert not n.endswith('.pyc'), f'Contains .pyc: {n}'
                  assert not n.endswith('.DS_Store'), f'Contains .DS_Store: {n}'
              print(f'✅ ZIP structure valid ({len(names)} files)')
          "

      - name: Generate checksums
        run: |
          cd release
          sha256sum python/* skills/* > SHA256SUMS.txt
          cat SHA256SUMS.txt
          cd ..

      # ── Upload 1 immutable artifact ────────────────────────────
      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ inputs.version }}
          path: release/
          retention-days: 90
  # ═════════════════════════════════════════════════════════════════
  #  publish-github  — tag + GitHub Release (downloadt bundle)
  # ═════════════════════════════════════════════════════════════════
  publish-github:
    name: Publish to GitHub Release
    needs: [quality-and-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ inputs.version }}
          path: release/

      - name: Create and push version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="v${{ inputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            release/python/*
            release/skills/*
            release/SHA256SUMS.txt

  # ═════════════════════════════════════════════════════════════════
  #  publish-pypi  — PyPI publicatie (downloadt bundle, geen rebuild)
  # ═════════════════════════════════════════════════════════════════
  publish-pypi:
    name: Publish to PyPI
    needs: [quality-and-build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ inputs.version }}
          path: release/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: release/python/
